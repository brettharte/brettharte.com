<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technical Artist — Brett Harte</title>

  
  <style>
    :root {
      --bg: #f3f0ea;
      --ink: #141414;
      --muted: #6f6a62;
      --line: rgba(20,20,20,.14);
      --dark: #111214;
      --cream: #fffaf0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: -0.035em;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(92vw, 1600px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 30px 0 70px;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      margin-bottom: clamp(90px, 16vh, 170px);
    }

    .brand {
      font-weight: 700;
    }

    nav {
      display: flex;
      gap: 34px;
      color: var(--muted);
      font-weight: 500;
    }

    nav a:hover {
      color: var(--ink);
    }

    .content {
      width: min(100%, 980px);
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(64px, 9vw, 150px);
      line-height: .88;
      margin: 0 0 24px;
      font-weight: 800;
      letter-spacing: -0.085em;
    }

    .intro {
      color: var(--muted);
      font-size: clamp(20px, 2vw, 28px);
      line-height: 1.35;
      max-width: 680px;
      margin: 0 0 38px;
      font-weight: 500;
      letter-spacing: -0.045em;
    }

    .lock-screen {
      max-width: 480px;
      margin-top: 38px;
    }

    .password-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    input {
      flex: 1 1 260px;
      min-width: 0;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.35);
      color: var(--ink);
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: rgba(20,20,20,.35);
      background: rgba(255,255,255,.55);
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 16px 20px;
      background: var(--dark);
      color: var(--cream);
      font-size: 15px;
      font-weight: 650;
      cursor: pointer;
      letter-spacing: -0.015em;
    }

    button:hover {
      opacity: .88;
    }

    .note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      letter-spacing: -0.015em;
    }

    .error {
      display: none;
      margin-top: 14px;
      color: #a7352d;
      font-size: 15px;
      letter-spacing: -0.015em;
    }

    .video-wrap {
      display: none;
      margin-top: 44px;
      border-radius: 28px;
      overflow: hidden;
      background: #111214;
      box-shadow: 0 36px 90px rgba(30, 22, 10, .22);
    }

    video {
      width: 100%;
      display: block;
      background: #111214;
    }

    .back {
      margin-top: auto;
      padding-top: 90px;
      color: var(--muted);
      font-weight: 550;
      width: min(100%, 980px);
      margin-left: auto;
      margin-right: auto;
    }

    .back:hover {
      color: var(--ink);
    }

    @media (max-width: 900px) {
      .page {
        width: auto;
        padding: 24px 18px 56px;
      }

      header {
        margin-bottom: 90px;
      }

      nav {
        gap: 18px;
      }

      h1 {
        font-size: clamp(60px, 18vw, 110px);
      }

      .video-wrap {
        border-radius: 18px;
      }

      .password-row {
        display: block;
      }

      input {
        width: 100%;
        margin-bottom: 12px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header>
      <a class="brand" href="/">Brett Harte</a>
      <nav>
        <a href="/">Work</a>
        <a href="/#about">About</a>
        <a href="/#contact">Contact</a>
      </nav>
    </header>

    <section class="content">
      <h1>Technical Artist</h1>

      <p class="intro" id="introText">
        This reel is private because some of the work is for a game currently in development and not yet public.
      </p>

      <div class="lock-screen" id="lockScreen">
        <div class="password-row">
          <input
            type="password"
            id="passwordInput"
            placeholder="Enter password"
            autocomplete="off"
          />

          <button onclick="unlockVideo()">Watch Video</button>
        </div>

        <div class="note">Private review page.</div>
        <div class="error" id="errorMessage">Incorrect password. Please try again.</div>
      </div>

      <div class="video-wrap" id="videoWrap">
        <video controls playsinline>
        <source src="Harte_TechArtist_Reel.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
      </div>
    </section>

    <a class="back" href="/">← Back to home</a>
  </main>

  <script>
    const PASSWORD = "ghost";

    function unlockVideo() {
      const input = document.getElementById("passwordInput").value;
      const error = document.getElementById("errorMessage");

      if (input === PASSWORD) {
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("videoWrap").style.display = "block";
        document.getElementById("introText").textContent = "This reel is private because some of the work is for a game currently in development and not yet public.";
        error.style.display = "none";
      } else {
        error.style.display = "block";
      }
    }

    document.getElementById("passwordInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        unlockVideo();
      }
    });
  </script>
</body>
</html>
